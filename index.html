<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta Left 4 Dead 2</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: radial-gradient(circle at top,#1e293b,#020617); }
.glass { backdrop-filter: blur(15px); }
.card { animation: fadeIn .4s ease; }
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body class="min-h-screen text-white p-5">
<div class="max-w-7xl mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-5xl font-black mb-2">🎡 LEFT 4 DEAD 2</h1>
    <p class="text-slate-400">Ruleta automática de equipos</p>
  </div>
  <div class="grid lg:grid-cols-3 gap-6">

    <!-- JUGADORES -->
    <div class="glass bg-white/5 border border-white/10 rounded-3xl p-5">
      <h2 class="text-2xl font-bold mb-4">👥 Jugadores</h2>
      <textarea id="playersInput" class="w-full h-96 bg-slate-900 rounded-xl p-4 outline-none border border-slate-700 text-white">Mati
Nyxzen
solo k
Triple X
kamar
stumaker
Takito
xd-tony-xd</textarea>
      <div class="mt-4 flex justify-between items-center">
        <div>Jugadores: <span id="countPlayers" class="font-bold">8</span></div>
        <div class="flex gap-2">
          <button id="clearBtn" class="bg-slate-600 hover:bg-slate-700 px-4 py-2 rounded-xl transition text-sm">🗑️ Limpiar todo</button>
          <button id="resetBtn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl transition text-sm">🔄 Reiniciar</button>
        </div>
      </div>
    </div>

    <!-- RULETA -->
    <div class="glass bg-white/5 border border-white/10 rounded-3xl p-5">
      <div class="flex justify-center">
        <div class="relative">
          <div class="absolute left-1/2 -translate-x-1/2 -top-4 z-10">
            <div class="w-0 h-0 border-l-[20px] border-r-[20px] border-t-[35px] border-l-transparent border-r-transparent border-t-white"></div>
          </div>
          <canvas id="wheel" width="550" height="550" class="rounded-full border-4 border-white shadow-2xl max-w-full"></canvas>
        </div>
      </div>
      <div class="text-center">
        <button id="spinBtn" class="mt-5 bg-green-600 hover:bg-green-700 px-8 py-3 rounded-2xl text-xl font-bold transition">🎡 GIRAR</button>
      </div>
      <div id="winner" class="text-center mt-5 text-3xl font-black min-h-[80px]"></div>
    </div>

    <!-- EQUIPOS -->
    <div class="space-y-5">
      <div class="glass bg-red-500/10 border border-red-500/20 rounded-3xl p-5">
        <h2 class="text-red-400 text-2xl font-bold mb-4">🧟 Infectados</h2>
        <ul id="infectedList" class="space-y-2"></ul>
      </div>
      <div class="glass bg-green-500/10 border border-green-500/20 rounded-3xl p-5">
        <h2 class="text-green-400 text-2xl font-bold mb-4">🔫 Supervivientes</h2>
        <ul id="survivorList" class="space-y-2"></ul>
      </div>
      <button id="copyBtn" class="w-full bg-blue-600 hover:bg-blue-700 px-4 py-3 rounded-2xl font-bold transition text-lg">📋 Copiar equipos</button>
      <div id="copyMsg" class="text-center text-green-400 font-bold text-sm hidden">✅ ¡Copiado al portapapeles!</div>
    </div>

  </div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const input = document.getElementById("playersInput");
const infectedList = document.getElementById("infectedList");
const survivorList = document.getElementById("survivorList");
const winner = document.getElementById("winner");

let players = [];
let currentAngle = 0;
let spinning = false;
let turn = 0;
const infectedNames = [];
const survivorNames = [];

function updatePlayers() {
  players = input.value.split("\n").map(x => x.trim()).filter(x => x);
  document.getElementById("countPlayers").textContent = players.length;
  drawWheel();
}

function getFontSize(numPlayers, radius) {
  if (numPlayers <= 4) return Math.floor(radius * 0.11);
  if (numPlayers <= 6) return Math.floor(radius * 0.09);
  if (numPlayers <= 8) return Math.floor(radius * 0.075);
  return Math.floor(radius * 0.065);
}

function drawWheel() {
  const size = canvas.width;
  const center = size / 2;
  const radius = center - 2;

  ctx.clearRect(0, 0, size, size);

  if (players.length === 0) {
    ctx.fillStyle = "white";
    ctx.font = "bold 32px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Sin jugadores", center, center);
    return;
  }

  const slice = (Math.PI * 2) / players.length;
  const fontSize = getFontSize(players.length, radius);

  players.forEach((player, index) => {
    const start = index * slice;
    const end = start + slice;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = `hsl(${(index * 360) / players.length}, 75%, 55%)`;
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#000000";
    ctx.font = `bold ${fontSize}px Arial`;
    const maxChars = players.length <= 6 ? 14 : 11;
    let displayText = player.length > maxChars ? player.substring(0, maxChars - 2) + "..." : player;
    ctx.fillText(displayText, radius - 18, 0);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(center, center, 22, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(center, center, 15, 0, Math.PI * 2);
  ctx.fillStyle = "#1e293b";
  ctx.fill();
}

function drawWheelRotated() {
  const size = canvas.width;
  const center = size / 2;
  const radius = center - 2;

  ctx.clearRect(0, 0, size, size);
  if (players.length === 0) return;

  const slice = (Math.PI * 2) / players.length;
  const fontSize = getFontSize(players.length, radius);

  players.forEach((player, index) => {
    const start = index * slice;
    const end = start + slice;

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, start, end);
    ctx.closePath();
    ctx.fillStyle = `hsl(${(index * 360) / players.length}, 75%, 55%)`;
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#000000";
    ctx.font = `bold ${fontSize}px Arial`;
    const maxChars = players.length <= 6 ? 14 : 11;
    let displayText = player.length > maxChars ? player.substring(0, maxChars - 2) + "..." : player;
    ctx.fillText(displayText, radius - 18, 0);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(center, center, 22, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(center, center, 15, 0, Math.PI * 2);
  ctx.fillStyle = "#1e293b";
  ctx.fill();
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

function spin() {
  if (spinning || players.length === 0) {
    if (players.length === 0) alert("No hay jugadores.");
    return;
  }
  spinning = true;

  const selectedIndex = Math.floor(Math.random() * players.length);
  const slice = (Math.PI * 2) / players.length;
  const sectorCenter = selectedIndex * slice + slice / 2;
  const targetAngle = -Math.PI / 2 - sectorCenter;
  const extraSpins = Math.PI * 2 * (8 + Math.floor(Math.random() * 4));
  let delta = ((targetAngle - currentAngle) % (Math.PI * 2));
  if (delta < 0) delta += Math.PI * 2;
  delta += extraSpins;

  const startAngle = currentAngle;
  const duration = 5000;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeOut(t);
    currentAngle = startAngle + delta * eased;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(currentAngle);
    ctx.translate(-canvas.width / 2, -canvas.height / 2);
    drawWheelRotated();
    ctx.restore();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = startAngle + delta;
      spinning = false;
      addPlayer(players[selectedIndex], selectedIndex);
    }
  }

  requestAnimationFrame(animate);
}

function addPlayer(name, index) {
  const li = document.createElement("li");
  li.className = "card bg-white/10 rounded-xl p-3 font-semibold";
  li.textContent = name;
  turn++;

  if (turn % 2 === 1) {
    infectedList.appendChild(li);
    infectedNames.push(name);
    winner.innerHTML = `🧟 ${name}<br><span class="text-red-400 text-xl">INFECTADO</span>`;
  } else {
    survivorList.appendChild(li);
    survivorNames.push(name);
    winner.innerHTML = `🔫 ${name}<br><span class="text-green-400 text-xl">SUPERVIVIENTE</span>`;
  }

  li.scrollIntoView({ behavior: "smooth", block: "nearest" });
  players.splice(index, 1);
  currentAngle = currentAngle % (Math.PI * 2);
  drawWheel();
  document.getElementById("countPlayers").textContent = players.length;

  if (players.length === 0) {
    winner.innerHTML += "<br><span class='text-yellow-400 text-lg'>✅ Equipos completos</span>";
  }
}

document.getElementById("spinBtn").onclick = spin;

document.getElementById("resetBtn").onclick = () => {
  currentAngle = 0;
  turn = 0;
  spinning = false;
  infectedNames.length = 0;
  survivorNames.length = 0;
  infectedList.innerHTML = "";
  survivorList.innerHTML = "";
  winner.innerHTML = "";
  updatePlayers();
};

document.getElementById("clearBtn").onclick = () => {
  currentAngle = 0;
  turn = 0;
  spinning = false;
  infectedNames.length = 0;
  survivorNames.length = 0;
  infectedList.innerHTML = "";
  survivorList.innerHTML = "";
  winner.innerHTML = "";
  input.value = "";
  updatePlayers();
};

document.getElementById("copyBtn").onclick = () => {
  const inf = infectedNames.length > 0
    ? "🧟 INFECTADOS:\n" + infectedNames.map((n, i) => `  ${i + 1}. ${n}`).join("\n")
    : "🧟 INFECTADOS: (vacío)";
  const sur = survivorNames.length > 0
    ? "🔫 SUPERVIVIENTES:\n" + survivorNames.map((n, i) => `  ${i + 1}. ${n}`).join("\n")
    : "🔫 SUPERVIVIENTES: (vacío)";
  const text = `=== LEFT 4 DEAD 2 — EQUIPOS ===\n\n${inf}\n\n${sur}`;

  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById("copyMsg");
    msg.classList.remove("hidden");
    setTimeout(() => msg.classList.add("hidden"), 2500);
  });
};

input.addEventListener("input", updatePlayers);
updatePlayers();
</script>
</body>
</html>
