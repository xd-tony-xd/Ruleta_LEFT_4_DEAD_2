<script>
/* ============================================================
   DATOS: Campañas oficiales de Left 4 Dead 2
   ============================================================ */
const MAPS = [
  { name: "Dead Center", official: true },
  { name: "Dark Carnival", official: true },
  { name: "Swamp Fever", official: true },
  { name: "Hard Rain", official: true },
  { name: "The Parish", official: true },
  { name: "The Passing", official: true },
  { name: "Crash Course", official: true },
  { name: "Death Toll", official: true },
  { name: "Dead Air", official: true },
  { name: "Blood Harvest", official: true },
  { name: "The Sacrifice", official: true },
  { name: "No Mercy", official: true },
  { name: "Cold Stream", official: true },
];

/* ============================================================
   TABS
   ============================================================ */
const tabTeams = document.getElementById("tabTeams");
const tabMaps = document.getElementById("tabMaps");
const viewTeams = document.getElementById("viewTeams");
const viewMaps = document.getElementById("viewMaps");

tabTeams.onclick = () => {
  tabTeams.classList.add("active");
  tabMaps.classList.remove("active");
  viewTeams.classList.remove("hidden");
  viewMaps.classList.add("hidden");
};
tabMaps.onclick = () => {
  tabMaps.classList.add("active");
  tabTeams.classList.remove("active");
  viewMaps.classList.remove("hidden");
  viewTeams.classList.add("hidden");
  drawMapWheel();
};

/* ============================================================
   RULETA DE JUGADORES / EQUIPOS
   ============================================================ */
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const input = document.getElementById("playersInput");
const teamsContainer = document.getElementById("teamsContainer");
const winner = document.getElementById("winner");
const modeHint = document.getElementById("modeHint");
const autoTeamSizeWrap = document.getElementById("autoTeamSizeWrap");
const autoTeamSizeInput = document.getElementById("autoTeamSize");
const autoTeamSizeLabel = document.getElementById("autoTeamSizeLabel");

let players = [];
let currentAngle = 0;
let spinning = false;
let turn = 0;
let currentMode = "classic"; // classic | 2v2 | 3v3 | 4v4 | auto
let autoTeamSize = 4;

// Estructura de equipos generada dinámicamente según el modo
// teams = [{ id, label, emoji, colorClass, members: [] }]
let teams = [];

const MODE_HINTS = {
  classic: "Cada jugador que sale en la ruleta se reparte alternadamente entre Infectados y Supervivientes.",
  "2v2": "Se crean equipos de 2 jugadores cada uno. Si sobran jugadores, se reparten en un equipo extra.",
  "3v3": "Se crean equipos de 3 jugadores cada uno. Si sobran jugadores, se reparten en un equipo extra.",
  "4v4": "Se crean equipos de 4 jugadores cada uno. Si sobran jugadores, se reparten en un equipo extra.",
  auto: "Se generan automáticamente todos los equipos necesarios según el tamaño elegido. Ej: 16 jugadores / 4 por equipo = 4 equipos.",
};

const TEAM_COLORS = [
  { bg: "bg-red-500/10", border: "border-red-500/20", text: "text-red-400" },
  { bg: "bg-green-500/10", border: "border-green-500/20", text: "text-green-400" },
  { bg: "bg-blue-500/10", border: "border-blue-500/20", text: "text-blue-400" },
  { bg: "bg-yellow-500/10", border: "border-yellow-500/20", text: "text-yellow-400" },
  { bg: "bg-purple-500/10", border: "border-purple-500/20", text: "text-purple-400" },
  { bg: "bg-pink-500/10", border: "border-pink-500/20", text: "text-pink-400" },
  { bg: "bg-cyan-500/10", border: "border-cyan-500/20", text: "text-cyan-400" },
  { bg: "bg-orange-500/10", border: "border-orange-500/20", text: "text-orange-400" },
];

function updatePlayers() {
  players = input.value.split("\n").map(x => x.trim()).filter(x => x);
  document.getElementById("countPlayers").textContent = players.length;
  drawWheel();
}

function getFontSize(numPlayers, radius) {
  if (numPlayers <= 4) return Math.floor(radius * 0.11);
  if (numPlayers <= 6) return Math.floor(radius * 0.09);
  if (numPlayers <= 8) return Math.floor(radius * 0.075);
  return Math.floor(radius * 0.065);
}

function drawGenericWheel(targetCtx, targetCanvas, items, getLabel) {
  const size = targetCanvas.width;
  const center = size / 2;
  const radius = center - 2;

  targetCtx.clearRect(0, 0, size, size);

  if (items.length === 0) {
    targetCtx.fillStyle = "white";
    targetCtx.font = "bold 32px Arial";
    targetCtx.textAlign = "center";
    targetCtx.textBaseline = "middle";
    targetCtx.fillText("Sin elementos", center, center);
    return;
  }

  const slice = (Math.PI * 2) / items.length;
  const fontSize = getFontSize(items.length, radius);

  items.forEach((item, index) => {
    const start = index * slice;
    const end = start + slice;

    targetCtx.beginPath();
    targetCtx.moveTo(center, center);
    targetCtx.arc(center, center, radius, start, end);
    targetCtx.closePath();
    targetCtx.fillStyle = `hsl(${(index * 360) / items.length}, 75%, 55%)`;
    targetCtx.fill();
    targetCtx.strokeStyle = "white";
    targetCtx.lineWidth = 2;
    targetCtx.stroke();

    targetCtx.save();
    targetCtx.translate(center, center);
    targetCtx.rotate(start + slice / 2);
    targetCtx.textAlign = "right";
    targetCtx.textBaseline = "middle";
    targetCtx.fillStyle = "#000000";
    targetCtx.font = `bold ${fontSize}px Arial`;
    const maxChars = items.length <= 6 ? 16 : items.length <= 8 ? 14 : 11;
    const label = getLabel(item);
    let displayText = label.length > maxChars ? label.substring(0, maxChars - 2) + "..." : label;
    targetCtx.fillText(displayText, radius - 18, 0);
    targetCtx.restore();
  });

  targetCtx.beginPath();
  targetCtx.arc(center, center, 22, 0, Math.PI * 2);
  targetCtx.fillStyle = "white";
  targetCtx.fill();
  targetCtx.beginPath();
  targetCtx.arc(center, center, 15, 0, Math.PI * 2);
  targetCtx.fillStyle = "#1e293b";
  targetCtx.fill();
}

function drawWheel() {
  drawGenericWheel(ctx, canvas, players, p => p);
}

function drawWheelRotated() {
  // Igual que drawWheel pero se usa dentro del save/rotate/restore del canvas durante la animación
  drawGenericWheel(ctx, canvas, players, p => p);
}

function easeOut(t) {
  return 1 - Math.pow(1 - t, 3);
}

function genericSpin({ items, ctxRef, canvasRef, getAngleState, setAngleState, onDone }) {
  const selectedIndex = Math.floor(Math.random() * items.length);
  const slice = (Math.PI * 2) / items.length;
  const sectorCenter = selectedIndex * slice + slice / 2;
  const targetAngle = -Math.PI / 2 - sectorCenter;
  const extraSpins = Math.PI * 2 * (8 + Math.floor(Math.random() * 4));
  let delta = ((targetAngle - getAngleState()) % (Math.PI * 2));
  if (delta < 0) delta += Math.PI * 2;
  delta += extraSpins;

  const startAngle = getAngleState();
  const duration = 5000;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = easeOut(t);
    const angle = startAngle + delta * eased;
    setAngleState(angle);

    ctxRef.save();
    ctxRef.translate(canvasRef.width / 2, canvasRef.height / 2);
    ctxRef.rotate(angle);
    ctxRef.translate(-canvasRef.width / 2, -canvasRef.height / 2);
    drawGenericWheel(ctxRef, canvasRef, items, getLabelFor(items));
    ctxRef.restore();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      setAngleState(startAngle + delta);
      onDone(selectedIndex);
    }
  }

  requestAnimationFrame(animate);
}

function getLabelFor(items) {
  // Detecta si son mapas (objetos con .name) o jugadores (strings)
  if (items.length && typeof items[0] === "object") return m => m.name;
  return p => p;
}

/* ---------- Gestión de modos de equipo ---------- */

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.mode === mode);
  });
  autoTeamSizeWrap.classList.toggle("hidden", mode !== "auto");
  modeHint.textContent = MODE_HINTS[mode];
  resetTeams();
}

document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => setMode(btn.dataset.mode));
});

autoTeamSizeInput.addEventListener("input", () => {
  autoTeamSize = parseInt(autoTeamSizeInput.value, 10);
  autoTeamSizeLabel.textContent = `${autoTeamSize} / equipo`;
  resetTeams();
});

function buildTeamsSkeleton() {
  teams = [];

  if (currentMode === "classic") {
    teams.push({ id: "infected", label: "Infectados", emoji: "🧟", color: TEAM_COLORS[0], members: [], capacity: Infinity });
    teams.push({ id: "survivors", label: "Supervivientes", emoji: "🔫", color: TEAM_COLORS[1], members: [], capacity: Infinity });
    return;
  }

  let size;
  if (currentMode === "2v2") size = 2;
  else if (currentMode === "3v3") size = 3;
  else if (currentMode === "4v4") size = 4;
  else size = autoTeamSize; // auto

  const totalPlayers = players.length + countAssignedMembers();
  const numTeams = Math.max(1, Math.ceil(totalPlayers / size)) || 1;

  for (let i = 0; i < numTeams; i++) {
    const color = TEAM_COLORS[i % TEAM_COLORS.length];
    teams.push({
      id: `team-${i}`,
      label: `Equipo ${i + 1}`,
      emoji: "👤",
      color,
      members: [],
      capacity: size,
    });
  }
}

function countAssignedMembers() {
  return teams.reduce((sum, t) => sum + t.members.length, 0);
}

function renderTeams() {
  teamsContainer.innerHTML = "";
  teams.forEach(team => {
    const wrapper = document.createElement("div");
    wrapper.className = `team-card glass ${team.color.bg} border ${team.color.border} rounded-3xl p-5`;

    const cap = team.capacity === Infinity ? "" : ` <span class="text-sm font-normal opacity-70">(${team.members.length}/${team.capacity})</span>`;
    wrapper.innerHTML = `
      <h2 class="${team.color.text} text-2xl font-bold mb-4">${team.emoji} ${team.label}${cap}</h2>
      <ul class="space-y-2" data-team-list="${team.id}"></ul>
    `;
    const ul = wrapper.querySelector("ul");
    team.members.forEach(name => {
      const li = document.createElement("li");
      li.className = "card bg-white/10 rounded-xl p-3 font-semibold";
      li.textContent = name;
      ul.appendChild(li);
    });

    teamsContainer.appendChild(wrapper);
  });
}

function resetTeams() {
  buildTeamsSkeleton();
  renderTeams();
}

function pickNextTeam() {
  // Modo clásico: alterna estrictamente infectado/superviviente
  if (currentMode === "classic") {
    turn++;
    return turn % 2 === 1 ? teams[0] : teams[1];
  }

  // Otros modos: reparte en rotación estricta (Equipo 1, Equipo 2, Equipo 3, Equipo 1, ...)
  // igual que infectados/supervivientes alternan, en vez de llenar un equipo
  // completo antes de pasar al siguiente.
  let attempts = 0;
  let candidate;
  while (attempts < teams.length) {
    const idx = turn % teams.length;
    candidate = teams[idx];
    turn++;
    if (candidate.members.length < candidate.capacity) {
      return candidate;
    }
    attempts++;
  }
  // Fallback: si por algún desbalance todos están llenos, cae en el último equipo
  return teams[teams.length - 1];
}

function addPlayer(name, index) {
  buildTeamsSkeletonIfNeeded();

  const team = pickNextTeam();
  team.members.push(name);
  renderTeams();

  const lastTeamCard = teamsContainer.querySelector(`[data-team-list="${team.id}"]`);
  if (lastTeamCard && lastTeamCard.lastElementChild) {
    lastTeamCard.lastElementChild.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  winner.innerHTML = `${team.emoji} ${name}<br><span class="${team.color.text} text-xl">${team.label.toUpperCase()}</span>`;

  players.splice(index, 1);
  currentAngle = currentAngle % (Math.PI * 2);
  drawWheel();
  document.getElementById("countPlayers").textContent = players.length;

  if (players.length === 0) {
    winner.innerHTML += "<br><span class='text-yellow-400 text-lg'>✅ Equipos completos</span>";
  }
}

function buildTeamsSkeletonIfNeeded() {
  if (teams.length === 0) buildTeamsSkeleton();
}

function spin() {
  if (spinning || players.length === 0) {
    if (players.length === 0) alert("No hay jugadores.");
    return;
  }
  spinning = true;
  buildTeamsSkeletonIfNeeded();

  genericSpin({
    items: players,
    ctxRef: ctx,
    canvasRef: canvas,
    getAngleState: () => currentAngle,
    setAngleState: (a) => { currentAngle = a; },
    onDone: (selectedIndex) => {
      spinning = false;
      addPlayer(players[selectedIndex], selectedIndex);
    },
  });
}

document.getElementById("spinBtn").onclick = spin;

document.getElementById("resetBtn").onclick = () => {
  currentAngle = 0;
  turn = 0;
  spinning = false;
  winner.innerHTML = "";
  resetTeams();
  updatePlayers();
};

document.getElementById("clearBtn").onclick = () => {
  currentAngle = 0;
  turn = 0;
  spinning = false;
  winner.innerHTML = "";
  input.value = "";
  resetTeams();
  updatePlayers();
};

document.getElementById("copyBtn").onclick = () => {
  const blocks = teams.map(team => {
    if (team.members.length === 0) return `${team.emoji} ${team.label.toUpperCase()}: (vacío)`;
    return `${team.emoji} ${team.label.toUpperCase()}:\n` + team.members.map((n, i) => `  ${i + 1}. ${n}`).join("\n");
  });
  const text = `=== LEFT 4 DEAD 2 — EQUIPOS ===\n\n${blocks.join("\n\n")}`;

  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById("copyMsg");
    msg.classList.remove("hidden");
    setTimeout(() => msg.classList.add("hidden"), 2500);
  });
};

input.addEventListener("input", updatePlayers);

/* ============================================================
   RULETA DE MAPAS
   ============================================================ */
const mapCanvas = document.getElementById("mapWheel");
const mapCtx = mapCanvas.getContext("2d");
const mapsList = document.getElementById("mapsList");
const mapWinner = document.getElementById("mapWinner");
const mapCountLabel = document.getElementById("mapCount");

let mapAngle = 0;
let mapSpinning = false;
let activeMaps = MAPS.map(m => ({ ...m, enabled: true }));

function getActiveMaps() {
  return activeMaps.filter(m => m.enabled);
}

function drawMapWheel() {
  drawGenericWheel(mapCtx, mapCanvas, getActiveMaps(), m => m.name);
}

function renderMapsList() {
  mapsList.innerHTML = "";
  activeMaps.forEach((m, idx) => {
    const row = document.createElement("label");
    row.className = "flex items-center gap-3 bg-white/5 hover:bg-white/10 rounded-xl p-3 cursor-pointer transition";
    row.innerHTML = `
      <input type="checkbox" data-idx="${idx}" ${m.enabled ? "checked" : ""} class="w-5 h-5 accent-purple-500">
      <span class="flex-1 font-semibold">${m.name}</span>
      ${m.official ? '<span class="text-xs bg-purple-500/20 text-purple-300 px-2 py-1 rounded-lg">Oficial</span>' : ""}
    `;
    mapsList.appendChild(row);
  });
  mapCountLabel.textContent = getActiveMaps().length;
  drawMapWheel();
}

mapsList.addEventListener("change", (e) => {
  const idx = e.target.dataset.idx;
  if (idx === undefined) return;
  activeMaps[idx].enabled = e.target.checked;
  mapCountLabel.textContent = getActiveMaps().length;
  drawMapWheel();
});

document.getElementById("mapsAllBtn").onclick = () => {
  activeMaps.forEach(m => m.enabled = true);
  renderMapsList();
};
document.getElementById("mapsNoneBtn").onclick = () => {
  activeMaps.forEach(m => m.enabled = false);
  renderMapsList();
};
document.getElementById("mapsOfficialBtn").onclick = () => {
  activeMaps.forEach(m => m.enabled = !!m.official);
  renderMapsList();
};

function spinMap() {
  const active = getActiveMaps();
  if (mapSpinning || active.length === 0) {
    if (active.length === 0) alert("No hay mapas seleccionados.");
    return;
  }
  mapSpinning = true;
  mapWinner.innerHTML = "";

  genericSpin({
    items: active,
    ctxRef: mapCtx,
    canvasRef: mapCanvas,
    getAngleState: () => mapAngle,
    setAngleState: (a) => { mapAngle = a; },
    onDone: (selectedIndex) => {
      mapSpinning = false;
      const map = active[selectedIndex];
      mapWinner.innerHTML = `🗺️ <span class="text-purple-400">${map.name}</span>`;
    },
  });
}

document.getElementById("spinMapBtn").onclick = spinMap;

/* ============================================================
   INIT
   ============================================================ */
setMode("classic");
renderMapsList();
updatePlayers();

</script>
</body>
</html>
